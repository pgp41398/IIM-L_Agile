<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f4;
    --surface: #ffffff;
    --surface-alt: #f9f9f8;
    --border: #e4e4e3;
    --border-strong: #d1d1cf;
    --text: #1c1c1b;
    --text-secondary: #6b6b68;
    --text-muted: #9c9c99;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-border: #bfdbfe;
    --accent-text: #1d4ed8;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-text: #b91c1c;
    --warning-bg: #fffbeb;
    --warning-text: #92400e;
    --success-bg: #f0fdf4;
    --success-text: #15803d;
    --mic-active: #ef4444;
    --mic-active-bg: #fef2f2;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1e1c;
      --surface-alt: #252523;
      --border: #2e2e2c;
      --border-strong: #3d3d3b;
      --text: #f0f0ef;
      --text-secondary: #a8a8a5;
      --text-muted: #6b6b68;
      --accent: #3b82f6;
      --accent-bg: #1e3a5f;
      --accent-border: #2563eb;
      --accent-text: #93c5fd;
      --danger: #ef4444;
      --danger-bg: #3b1212;
      --danger-text: #fca5a5;
      --warning-bg: #3b2a0a;
      --warning-text: #fcd34d;
      --success-bg: #0f2e1a;
      --success-text: #86efac;
      --mic-active: #f87171;
      --mic-active-bg: #3b1212;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app { width: 100%; max-width: 600px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 i { color: var(--accent); font-size: 22px; }

  .stats { display: flex; gap: 6px; }

  .stat {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }

  .stat span { color: var(--text-secondary); font-weight: 600; }

  /* Add row */
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0.5rem;
  }

  .input-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap input {
    width: 100%;
    height: 40px;
    padding: 0 42px 0 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }

  .input-wrap input::placeholder { color: var(--text-muted); }

  /* Mic button inside input */
  .mic-btn {
    position: absolute;
    right: 8px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: color 0.15s, background 0.15s;
    padding: 0;
  }

  .mic-btn:hover { color: var(--accent); background: var(--accent-bg); }

  .mic-btn.recording {
    color: var(--mic-active);
    background: var(--mic-active-bg);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.8; }
  }

  .mic-btn.unsupported { opacity: 0.3; cursor: not-allowed; }

  /* Speech status bar */
  .speech-status {
    font-size: 12px;
    color: var(--mic-active);
    margin-bottom: 0.75rem;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-left: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .speech-status.visible { opacity: 1; }

  .speech-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mic-active);
    animation: blink 1s step-start infinite;
    flex-shrink: 0;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .priority-select {
    height: 40px;
    padding: 0 10px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .add-btn {
    height: 40px;
    padding: 0 16px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.98); }

  /* Filters */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-size: 12px;
    padding: 5px 13px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }

  .filter-btn:hover { background: var(--surface); border-color: var(--border-strong); }
  .filter-btn.active { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }

  /* Task list */
  .tasks { display: flex; flex-direction: column; gap: 6px; }

  .task {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    transition: border-color 0.15s;
  }

  .task:hover { border-color: var(--border-strong); }
  .task.done { opacity: 0.5; }
  .task.done .task-text { text-decoration: line-through; color: var(--text-muted); }

  .check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: transparent;
    transition: border-color 0.12s, background 0.12s;
  }

  .check:hover { border-color: var(--accent); }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.checked i { color: #fff; font-size: 12px; }

  .task-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.4; }

  .badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .badge.high   { background: var(--danger-bg);  color: var(--danger-text); }
  .badge.medium { background: var(--warning-bg); color: var(--warning-text); }
  .badge.low    { background: var(--success-bg); color: var(--success-text); }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    padding: 3px;
    border-radius: 5px;
    opacity: 0;
    transition: opacity 0.15s, color 0.12s;
    font-size: 16px;
  }

  .task:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--danger); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty i { font-size: 36px; display: block; margin-bottom: 10px; color: var(--border-strong); }

  /* Progress bar */
  .progress-wrap { margin-bottom: 1rem; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s ease;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><i class="ti ti-checkbox" aria-hidden="true"></i>My tasks</h1>
    <div class="stats">
      <div class="stat"><span id="done-count">0</span> done</div>
      <div class="stat"><span id="total-count">0</span> total</div>
    </div>
  </div>

  <div class="add-row">
    <div class="input-wrap">
      <input type="text" id="task-input" placeholder="Add a task or tap the mic…" maxlength="120" aria-label="New task" />
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" aria-label="Dictate task" title="Dictate task">
        <i class="ti ti-microphone" id="mic-icon" aria-hidden="true"></i>
      </button>
    </div>
    <select class="priority-select" id="priority-select" aria-label="Priority">
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>
    <button class="add-btn" onclick="addTask()"><i class="ti ti-plus" aria-hidden="true"></i> Add</button>
  </div>

  <div class="speech-status" id="speech-status">
    <span class="speech-dot"></span>
    <span id="speech-status-text">Listening…</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('high', this)">High priority</button>
  </div>

  <div class="tasks" id="task-list" role="list"></div>
</div>

<script>
let tasks = [
  { id: 1, text: 'Review project proposal', done: false, priority: 'high' },
  { id: 2, text: 'Schedule team standup', done: false, priority: 'medium' },
  { id: 3, text: 'Update documentation', done: true, priority: 'low' },
];
let nextId = 4;
let filter = 'all';

/* ── Speech recognition setup ── */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;

const micBtn    = document.getElementById('mic-btn');
const micIcon   = document.getElementById('mic-icon');
const statusBar = document.getElementById('speech-status');
const statusTxt = document.getElementById('speech-status-text');

if (!SpeechRecognition) {
  micBtn.classList.add('unsupported');
  micBtn.title = 'Speech recognition not supported in this browser';
  micBtn.onclick = () => alert('Speech recognition is not supported in your browser. Try Chrome or Edge.');
} else {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    micIcon.className = 'ti ti-microphone-off';
    statusBar.classList.add('visible');
    statusTxt.textContent = 'Listening…';
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    const input = document.getElementById('task-input');
    if (final) {
      input.value = final.trim();
      statusTxt.textContent = 'Got it — press Add or hit Enter';
    } else {
      input.value = interim;
      statusTxt.textContent = 'Listening…';
    }
  };

  recognition.onerror = (e) => {
    const msgs = {
      'not-allowed': 'Microphone access denied. Allow it in your browser settings.',
      'no-speech':   'No speech detected. Try again.',
      'network':     'Network error. Check your connection.',
    };
    statusTxt.textContent = msgs[e.error] || 'Something went wrong. Try again.';
    stopMic();
  };

  recognition.onend = () => { stopMic(); };
}

function toggleMic() {
  if (!recognition) return;
  if (isRecording) {
    recognition.stop();
  } else {
    document.getElementById('task-input').value = '';
    recognition.start();
  }
}

function stopMic() {
  isRecording = false;
  micBtn.classList.remove('recording');
  micIcon.className = 'ti ti-microphone';
  setTimeout(() => statusBar.classList.remove('visible'), 2500);
}

/* ── Task logic ── */
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const priority = document.getElementById('priority-select').value;
  tasks.unshift({ id: nextId++, text, done: false, priority });
  input.value = '';
  statusBar.classList.remove('visible');
  render();
  input.focus();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  let visible = tasks;
  if (filter === 'active') visible = tasks.filter(t => !t.done);
  else if (filter === 'done') visible = tasks.filter(t => t.done);
  else if (filter === 'high') visible = tasks.filter(t => t.priority === 'high');

  const done  = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct   = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('done-count').textContent  = done;
  document.getElementById('total-count').textContent = total;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const list = document.getElementById('task-list');

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty"><i class="ti ti-checkbox" aria-hidden="true"></i>${
      filter === 'done' ? 'No completed tasks yet' :
      filter === 'high' ? 'No high-priority tasks' :
      'Nothing here — add a task above'
    }</div>`;
    return;
  }

  list.innerHTML = visible.map(t => `
    <div class="task${t.done ? ' done' : ''}" role="listitem">
      <button class="check${t.done ? ' checked' : ''}" onclick="toggleTask(${t.id})"
        aria-label="${t.done ? 'Mark incomplete' : 'Mark complete'}">
        ${t.done ? '<i class="ti ti-check" aria-hidden="true"></i>' : ''}
      </button>
      <span class="task-text">${esc(t.text)}</span>
      <span class="badge ${t.priority}">${t.priority}</span>
      <button class="del-btn" onclick="deleteTask(${t.id})" aria-label="Delete task">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>
  `).join('');
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

render();
</script>
</body>
</html>
